name: Wellness Monitor

on:
  schedule:
    - cron: '5 15-6 * * *'  # Every hour :05, 7:05am-10:05pm PST (UTC-8 → 15:05-06:05 UTC)
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run monitor
        env:
          IS_CLOUD: 'true'
          WL_EMAIL: ${{ secrets.WL_EMAIL }}
          WL_PASSWORD: ${{ secrets.WL_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: node monitor.js
